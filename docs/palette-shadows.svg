<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <style>
    .label{font:700 14px 'Figtree', system-ui, sans-serif; fill:#111}
    .sub{font:400 12px 'Figtree', system-ui, sans-serif; fill:#333}
  </style>

  <defs>
    <filter id="shadow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#182420" flood-opacity="0.07"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#182420" flood-opacity="0.05"/>
    </filter>
    <filter id="shadow-md" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="#182420" flood-opacity="0.10"/>
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#182420" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="24" stdDeviation="60" flood-color="#182420" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#182420" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="280" rx="8" fill="#FFFFFF" />

  <g transform="translate(40,28)">
    <text class="label" x="0" y="0">Shadows Preview</text>
    <text class="sub" x="0" y="20">Beispiel-Schatten, passend zu --shadow-sm / --shadow-md / --shadow-lg</text>

    <g transform="translate(0,48)">
      <text class="sub" x="0" y="0">--shadow-sm</text>
      <rect x="0" y="10" width="220" height="80" rx="12" fill="#FFFFFF" stroke="#E6EAE6" filter="url(#shadow-sm)"/>
      <text class="sub" x="0" y="110">box-shadow: 0 1px 3px rgba(24,36,32,0.07), 0 1px 2px rgba(24,36,32,0.05);</text>
    </g>

    <g transform="translate(260,48)">
      <text class="sub" x="0" y="0">--shadow-md</text>
      <rect x="0" y="10" width="220" height="80" rx="12" fill="#FFFFFF" stroke="#E6EAE6" filter="url(#shadow-md)"/>
      <text class="sub" x="0" y="110">box-shadow: 0 6px 20px rgba(24,36,32,0.10), 0 2px 6px rgba(24,36,32,0.06);</text>
    </g>

    <g transform="translate(520,48)">
      <text class="sub" x="0" y="0">--shadow-lg</text>
      <rect x="0" y="10" width="220" height="80" rx="12" fill="#FFFFFF" stroke="#E6EAE6" filter="url(#shadow-lg)"/>
      <text class="sub" x="0" y="110">box-shadow: 0 24px 60px rgba(24,36,32,0.16), 0 6px 16px rgba(24,36,32,0.08);</text>
    </g>
  </g>
</svg>